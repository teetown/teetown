name: Check style

on:
  push:
    # branches-ignore:
    #   - main
  pull_request:

jobs:
  check-style:
    runs-on: ubuntu-22.04
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive
    - name: Prepare
      run: |
        sudo apt-get update -y
        sudo apt-get install jq -y
    - name: Check header guards
      run: scripts/check_header_guards.py
    - name: Lint JSON
      run: |
        while read -r json;
        do
          jq '.' "$json" || { echo "$json"; exit 1; };
        done < <(find . -name "*.json");

